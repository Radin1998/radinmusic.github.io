<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #080808; color: #fff; font-family: 'Inter', sans-serif; }
        .font-logo { font-family: 'Syncopate', sans-serif; text-transform: uppercase; letter-spacing: -0.05em; }
        
        .video-container {
            width: 100%;
            max-width: 350px;
            aspect-ratio: 9/16;
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            background: #000;
            /* This ensures the container itself doesn't trigger anything */
            user-select: none;
            -webkit-user-select: none;
        }

        .video-container iframe {
            position: absolute;
            top: 50%; left: 50%;
            width: 100%; height: 115%; 
            transform: translate(-50%, -50%) scale(1.4);
            /* We tell the video to ignore all clicks */
            pointer-events: none;
        }

        /* THE INVISIBLE SHIELD: A layer of 'glass' over the video */
        .video-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: transparent;
            cursor: default;
        }

        .btn-presskit {
            background: #fff; color: #000;
            padding: 12px 40px; border-radius: 50px;
            font-weight: 700; text-transform: uppercase;
            font-size: 0.75rem; letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        .btn-presskit:hover { transform: scale(1.05); background: #f0f0f0; }
        .icon-link { color: #fff; opacity: 0.8; transition: opacity 0.3s ease; }
        .icon-link:hover { opacity: 1; }
    </style>
</head>
<body class="flex flex-col items-center px-6 py-12 md:py-20">

    <div class="video-container shadow-2xl mb-10">
        <div class="video-shield"></div>
        
        <iframe src="https://www.youtube.com/embed/SOzQEY-413k?autoplay=1&mute=1&controls=0&loop=1&playlist=SOzQEY-413k&showinfo=0&rel=0&iv_load_policy=3&modestbranding=1&disablekb=1&playsinline=1" 
                frameborder="0" allow="autoplay; encrypted-media"></iframe>
    </div>

    <h1 class="font-logo text-5xl md:text-7xl mb-8 tracking-tighter text-center">Radin</h1>

    <div class="mb-12">
        <a href="presskit.pdf" target="_blank" class="btn-presskit">Press Kit</a>
    </div>

    <div class="flex items-center gap-8 mb-20">
        <a href="https://instagram.com/radin_music_" target="_blank" class="icon-link"><i data-lucide="instagram" class="w-6 h-6"></i></a>
        <a href="mailto:contact@djradin.com" class="icon-link"><i data-lucide="mail" class="w-6 h-6"></i></a>
        <a href="https://wa.me/447597446761" target="_blank" class="icon-link"><i data-lucide="message-circle" class="w-6 h-6"></i></a>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
