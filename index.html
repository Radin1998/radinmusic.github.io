<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADIN | Swedish-Iranian DJ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,700;0,800;1,700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #E6D5C3; 
            color: #4A3F35; 
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at top right, rgba(255, 255, 255, 0.4), transparent),
                              radial-gradient(circle at bottom left, rgba(212, 163, 115, 0.3), transparent);
            background-attachment: fixed;
        }
        
        .font-logo { 
            font-family: 'Inter', sans-serif; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: -0.02em; 
            color: #2D241E; 
        }
        
        .bio-text { 
            font-family: 'Inter', sans-serif;
            font-size: 1.15rem; 
            line-height: 1.6; 
            font-weight: 400;
            color: #2D241E;
        }

        .video-container {
            width: 100%; max-width: 350px; aspect-ratio: 9/16;
            position: relative; overflow: hidden; border-radius: 24px;
            border: 4px solid #F5EBE0; background: #000;
            box-shadow: 0 20px 50px rgba(180, 125, 74, 0.2);
        }
        .clean-video { width: 100%; height: 100%; object-fit: cover; }

        .btn-presskit, .btn-chat, .btn-soundcloud, .btn-instagram {
            padding: 12px 30px; 
            border-radius: 50px; 
            font-weight: 700; 
            text-transform: uppercase; 
            font-size: 0.7rem; 
            letter-spacing: 2px; 
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 44px;
        }

        .btn-presskit { background: #2D241E; color: #fff; }
        .btn-chat { border: 2px solid #BC8A5F; color: #BC8A5F; }
        .btn-soundcloud { background: #ff5500; color: #fff; box-shadow: 0 4px 15px rgba(255, 85, 0, 0.2); }
        .btn-instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); color: #fff; }
        
        .btn-chat:hover { background: #BC8A5F; color: #fff; }
        .btn-soundcloud:hover { background: #ff7733; transform: scale(1.05); }
        .btn-instagram:hover { transform: scale(1.05); }
        .btn-presskit:hover { background: #4A3F35; transform: translateY(-2px); }

        .gallery-tab { cursor: pointer; transition: all 0.3s ease; border-bottom: 2px solid transparent; color: #8B735B; font-weight: 700; }
        .gallery-tab.active { color: #2D241E; border-bottom: 2px solid #2D241E; }
        
        .media-card { 
            position: relative; 
            border-radius: 12px; 
            overflow: hidden; 
            background: #DBCAB8; 
            transition: transform 0.3s ease; 
            break-inside: avoid; 
            margin-bottom: 1rem; 
            border: 1px solid rgba(0,0,0,0.05);
        }

        .media-card img {
            width: 100%;
            height: auto;
            display: block;
        }

        .yt-short {
            aspect-ratio: 9/16;
            width: 100%;
            background: #000;
        }

        .yt-short iframe {
            width: 100%;
            height: 100%;
            display: block;
        }

        .media-card:hover { transform: scale(1.01); }
        
        #contact-modal { display: none; position: fixed; inset: 0; background: rgba(45, 36, 30, 0.8); z-index: 50; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .about-section { max-width: 900px; border-top: 1px solid rgba(45, 36, 30, 0.1); padding-top: 4rem; }
        .text-accent { color: #BC8A5F; }
    </style>
</head>
<body class="flex flex-col items-center px-6 py-12 md:py-20">

    <!-- HERO VIDEO -->
    <div class="video-container shadow-2xl mb-10">
        <video class="clean-video" autoplay muted loop playsinline>
            <source src="hero-video.mp4" type="video/mp4">
        </video>
    </div>

    <div class="text-center mb-10">
        <h1 class="font-logo text-5xl md:text-7xl tracking-tighter">Radin</h1>
        <p class="text-accent uppercase tracking-[0.3em] text-xs md:text-sm font-bold mt-2">Swedish-Iranian DJ</p>
    </div>

    <div class="flex flex-wrap justify-center gap-4 mb-20">
        <a href="https://instagram.com/radin_music_" target="_blank" class="btn-instagram">Instagram</a>
        <a href="https://soundcloud.com/user185861951" target="_blank" class="btn-soundcloud">SoundCloud</a>
        <a href="presskit.pdf" target="_blank" class="btn-presskit">Press Kit</a>
        <button onclick="toggleModal(true)" class="btn-chat">Let's Chat</button>
    </div>

    <div class="about-section grid grid-cols-1 md:grid-cols-2 gap-10 items-start mb-24">
        <div class="space-y-2">
            <h2 class="text-3xl md:text-4xl font-extrabold leading-tight tracking-tight uppercase text-[#2D241E]">
                A JOURNEY <span class="text-accent italic font-bold">BEYOND</span> BORDERS.
            </h2>
        </div>
        <p class="bio-text">
            Radin crafts music that moves both body and mind, drawing on rhythms from across the globe. <span class="italic text-accent font-bold">Born in Sweden with Iranian heritage</span>, his multicultural background shapes a distinctive, immersive sound.
        </p>
    </div>

    <div class="w-full max-w-6xl">
        <div class="flex justify-center gap-8 mb-12 border-b border-black/5">
            <h3 onclick="switchGallery('photos')" id="tab-photos" class="gallery-tab active text-lg uppercase tracking-widest pb-4">Photos</h3>
            <h3 onclick="switchGallery('videos')" id="tab-videos" class="gallery-tab text-lg uppercase tracking-widest pb-4">Videos</h3>
        </div>

        <!-- PHOTO GALLERY -->
        <div id="gallery-photos" class="columns-1 md:columns-2 lg:columns-3 gap-4">
            <div class="media-card">
                <img src="ikaro-dj.jpg.jpg" alt="DJ Radin Performance - Ikaro">
            </div>
            <div class="media-card">
                <img src="a3fb5c9f-7132-488f-8315-1005a9cea66e.jpeg" alt="DJ Radin - Image 1">
            </div>
            <div class="media-card">
                <img src="IMG_5336.jpeg" alt="DJ Radin - Image 2">
            </div>
            <div class="media-card">
                <img src="IMG_0268.jpeg" alt="DJ Radin - Image 3">
            </div>
            <div class="media-card">
                <img src="IMG_4488.jpeg" alt="DJ Radin Performance - Image 4">
            </div>
            <div class="media-card">
                <img src="921EE074-552A-4427-8B16-4CD7FC98B738.jpeg" alt="DJ Radin Performance - Image 5">
            </div>
        </div>

        <!-- VIDEO GALLERY (Hidden by default via style="display:none") -->
        <div id="gallery-videos" class="columns-1 md:columns-2 lg:columns-3 gap-4" style="display:none;">
            <div class="media-card yt-short">
                <iframe src="https://www.youtube.com/embed/S1O2ERgULfg?modestbranding=1&rel=0" title="Radin Performance 1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <div class="media-card yt-short">
                <iframe src="https://www.youtube.com/embed/SOzQEY-413k?modestbranding=1&rel=0" title="Radin Performance 2" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <div class="media-card yt-short">
                <iframe src="https://www.youtube.com/embed/28V_kofYsBM?modestbranding=1&rel=0" title="Radin Performance 3" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <div class="media-card yt-short">
                <iframe src="https://www.youtube.com/embed/eqjXTKkX56A?modestbranding=1&rel=0" title="Radin Performance 4" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <div class="flex items-center gap-10 mt-24 mb-10">
        <a href="https://instagram.com/radin_music_" target="_blank" class="text-[#8B735B] hover:text-[#2D241E] transition-colors"><i data-lucide="instagram" class="w-5 h-5"></i></a>
        <a href="mailto:contact@djradin.com" class="text-[#8B735B] hover:text-[#2D241E] transition-colors"><i data-lucide="mail" class="w-5 h-5"></i></a>
        <a href="https://wa.me/447597446761" target="_blank" class="text-[#8B735B] hover:text-[#2D241E] transition-colors"><i data-lucide="message-circle" class="w-5 h-5"></i></a>
    </div>

    <!-- SCRIPTS -->
    <script>
        lucide.createIcons();

        function switchGallery(type) {
            const photos = document.getElementById('gallery-photos');
            const videos = document.getElementById('gallery-videos');
            const tabPhotos = document.getElementById('tab-photos');
            const tabVideos = document.getElementById('tab-videos');

            if (type === 'photos') {
                photos.style.display = 'block';
                videos.style.display = 'none';
                tabPhotos.classList.add('active');
                tabVideos.classList.remove('active');
            } else {
                photos.style.display = 'none';
                videos.style.display = 'block';
                tabVideos.classList.add('active');
                tabPhotos.classList.remove('active');
            }
        }
        
        // Modal placeholder function to prevent errors if button is clicked
        function toggleModal(show) {
            console.log("Chat clicked");
        }
    </script>
</body>
</html>
